<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordle Clone</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="header">
        <div class="header__left">
          <label class="difficultyLabel" for="difficultySelect">Mode</label>
          <select id="difficultySelect" class="difficultySelect" aria-label="Difficulty mode">
            <option value="easy" selected>Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <h1 class="header__title" id="headerTitle">Wordle Chain</h1>
        <div class="header__right">
          <button class="iconButton" id="hintBtn" type="button" aria-label="Show hint" title="Show hint">
            Hint
          </button>
          <button class="iconButton" id="newGameBtn" type="button" aria-label="New game" title="New game">
            New
          </button>
        </div>
      </header>

      <main class="main">
        <section class="board" aria-label="Board">
          <div class="history" id="history" aria-label="Solved words"></div>
          <div class="chainDivider" id="chainDivider" aria-hidden="true"></div>
          <div class="grid" id="grid" aria-label="Guesses grid"></div>
          <p class="status" id="statusText" aria-live="polite"></p>
        </section>

        <section class="keyboard" id="keyboardSection" aria-label="Keyboard">
          <div class="keyboard__row" id="kbRow1"></div>
          <div class="keyboard__row" id="kbRow2"></div>
          <div class="keyboard__row" id="kbRow3"></div>
          <p class="mobileAnswerFlash" id="mobileAnswerFlash" aria-live="polite"></p>
        </section>

        <section class="celebration hiddenSection" id="celebrationSection" aria-live="polite">
          <p class="celebrationText">Chain complete!</p>
          <div class="starRating" id="starRating" aria-label="Star rating"></div>
          <p class="ratingMeta" id="ratingMeta"></p>
          <button class="primaryButton" id="chainPlayAgainBtn" type="button">Play again</button>
        </section>
      </main>

      <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
      <div class="confettiLayer" id="confettiLayer" aria-hidden="true"></div>
      <button class="answerFab" id="answerBtn" type="button" aria-label="Show answer" title="Show answer">Answer</button>

      <div class="modalOverlay hidden" id="modalOverlay" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
          <h2 class="modal__title" id="modalTitle">Game over</h2>
          <p class="modal__body" id="modalBody"></p>
          <div class="modal__actions">
            <button class="primaryButton" id="playAgainBtn" type="button">Play again</button>
            <button class="secondaryButton" id="closeModalBtn" type="button">Close</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
