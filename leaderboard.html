<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Leaderboard · Wordle Chain</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app app--subpage">
      <header class="header header--subpage">
        <a class="subpageBackLink" href="./index.html" aria-label="Back to game">← Back</a>
        <h1 class="header__title header__title--subpage">Leaderboard</h1>
        <span class="header__trailing header__trailing--spacer" aria-hidden="true"></span>
      </header>

      <main class="subpageMain">
        <p class="subpageNote">Sample data — rankings from other players will appear here.</p>
        <div class="leaderboardTableWrap">
          <table class="leaderboardTable">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Player</th>
                <th scope="col">Mode</th>
                <th scope="col">Stars</th>
                <th scope="col">Guesses</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td>chain_master</td>
                <td>Hard</td>
                <td>★★★★★</td>
                <td>12</td>
              </tr>
              <tr>
                <td>2</td>
                <td>wordie_ninja</td>
                <td>Hard</td>
                <td>★★★★☆</td>
                <td>14</td>
              </tr>
              <tr>
                <td>3</td>
                <td>daily_grinder</td>
                <td>Medium</td>
                <td>★★★★★</td>
                <td>11</td>
              </tr>
              <tr>
                <td>4</td>
                <td>coffee_table</td>
                <td>Easy</td>
                <td>★★★★★</td>
                <td>9</td>
              </tr>
              <tr>
                <td>5</td>
                <td>hint_haver</td>
                <td>Easy</td>
                <td>★★★☆☆</td>
                <td>18</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
